apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    component: catalogue
    env: dev
    tier: app
spec: 
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      component: catalogue
      env: dev
      tier: app
  template:
    metadata:
      labels:
        project: roboshop
        component: catalogue
        env: dev
        tier: app
    spec:
      containers:
      - name: catalogue
        image: "{{ .Values.deployment.url }}:{{ .Values.deployment.imageversion }}"
        envFrom:
        - configMapRef:
            name: catalogue
        resources:
          requests:
            memory: "150Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "256m"

